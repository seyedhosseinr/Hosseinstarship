name: Build and Push GHCR Image

on:
  push:
    branches:
      - feat/single-user-auth
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/seyedhosseinr/starship

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:latest"
            echo "${IMAGE_NAME}:${GITHUB_SHA}"

            branch_tag="$(printf '%s' "${GITHUB_REF_NAME}" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's#[^a-z0-9_.-]+#-#g; s#^[.-]+##; s#[.-]+$##; s#-+#-#g')"

            if [[ -n "${branch_tag}" && "${#branch_tag}" -le 128 ]]; then
              echo "${IMAGE_NAME}:${branch_tag}"
            fi

            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
