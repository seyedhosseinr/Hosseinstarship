// ── Import ───────────────────────────────────────────────────
export const importApi = {
  import: (type: ImportType, data: any[]) => {
    if (!Array.isArray(data) || data.length === 0)
      throw new Error("No data to import");

    return request<{
      success:  boolean;
      type:     ImportType;
      total:    number;
      imported: number;
      skipped:  number;
      errors:   { index: number; message: string }[];
      message:  string;
    }>(`/import/${type}`, {
      method: "POST",
      body:   JSON.stringify({ data }),
    });
  },
};