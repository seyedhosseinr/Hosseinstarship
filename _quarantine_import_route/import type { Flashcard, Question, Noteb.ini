import type { Flashcard, Question, Notebook } from "@/types/index";

export type { Flashcard, Question, Notebook };

type ImportType = "notes" | "flashcards" | "questions";

// Client: relative /api works because Next.js serves both on same origin.
// Override with NEXT_PUBLIC_API_BASE_URL for cross-origin setups.
const API_BASE =
  (typeof window !== "undefined"
    ? process.env.NEXT_PUBLIC_API_BASE_URL ?? ""
    : process.env.NEXT_PUBLIC_API_BASE_URL ?? "http://localhost:3000"
  ).replace(/\/$/, "") + "/api";

const JSON_HEADERS: HeadersInit = {
  "Content-Type": "application/json; charset=utf-8",
  Accept:         "application/json; charset=utf-8",
};

function isHtml(text: string) {
  const t = text.trim().toLowerCase();
  return t.startsWith("<!doctype") || t.startsWith("<html");
}

async function request<T>(path: string, init?: RequestInit): Promise<T> {
  const url = `${API_BASE}${path}`;

  const res = await fetch(url, {
    ...init,
    headers: { ...JSON_HEADERS, ...(init?.headers ?? {}) },
  });

  // Always decode as UTF-8
  const buf  = await res.arrayBuffer();
  const text = new TextDecoder("utf-8").decode(buf);

  if (!res.ok) {
    // Guard against Next.js 404/500 HTML pages
    if (isHtml(text)) {
      throw new Error(`API Route Not Found (${res.status}): ${url}`);
    }
    let msg = `HTTP ${res.status}`;
    try {
      const j = JSON.parse(text);
      msg = j?.error ?? j?.message ?? msg;
    } catch { /* use status text */ }
    throw new Error(msg);
  }

  if (!text.trim()) return {} as T;

  try {
    return JSON.parse(text) as T;
  } catch {
    throw new Error("API returned non-JSON response");
  }
}

// ── Notes ────────────────────────────────────────────────────
export const notesApi = {
  getAll:     () => request<Notebook[]>("/notes"),
  deleteMany: (ids: string[]) =>
    request<{ deleted: number }>("/notes", {
      method: "DELETE",
      body:   JSON.stringify({ ids }),
    }),
};

